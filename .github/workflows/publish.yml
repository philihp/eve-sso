name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

# Trusted publishing to npm requires an OIDC token, and provenance
# attestations are written to the public transparency log.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false  # never use caching in release builds

      # npm 11.5.1 required for OIDC staged publish. Remove once Microsoft updates their shit.
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - run: npm stage publish --provenance --access public
